name: Security Scan

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Bandit (code scan)
        id: bandit_scan
        run: |
          set +e
          bandit -r . -x ./.venv,./venv,./tests -f txt -o bandit-report.txt
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # Bandit returns 1 when it finds issues; reserve failure for tool errors.
          if [ "$code" -gt 1 ]; then
            exit "$code"
          fi

      - name: Run pip-audit (dependency scan)
        id: pip_audit_scan
        run: |
          set +e
          pip-audit -r requirements.txt --format markdown --output pip-audit-report.md
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # pip-audit returns 1 when vulnerabilities are found.
          if [ "$code" -gt 1 ]; then
            exit "$code"
          fi

      - name: Build security summary
        if: always()
        run: |
          echo "## Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bandit exit code: ${{ steps.bandit_scan.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- pip-audit exit code: ${{ steps.pip_audit_scan.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Bandit" >> "$GITHUB_STEP_SUMMARY"
          if [ -s bandit-report.txt ]; then
            cat bandit-report.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Bandit report output." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### pip-audit" >> "$GITHUB_STEP_SUMMARY"
          if [ -s pip-audit-report.md ]; then
            cat pip-audit-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No pip-audit report output." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.txt
            pip-audit-report.md
