{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2>Demo Setup / Register</h2>
        <p style="color: var(--color-muted); margin-bottom: 2rem;">For Hackathon demo purposes, pick your role.</p>
        <form action="{{ url_for('auth.register') }}" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <label style="color: var(--color-muted)">Role:</label>
            <select name="role">
                <option value="client">Client (Website Owner)</option>
                <option value="admin">Admin (Security Provider)</option>
            </select>
            
            <label style="color: var(--color-muted)">Plan:</label>
            <select name="plan">
                <option value="free">Free (Scan Only)</option>
                <option value="premium">Premium (AI Auto-Fix Included)</option>
            </select>
            
            <button type="submit">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
